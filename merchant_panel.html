<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>商户控制台外挂组件 - FinLinks 2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 p-4 font-mono text-xs">

    <div class="max-w-md mx-auto bg-gray-950 border border-gray-800 p-5 rounded text-gray-300 space-y-4">
        <div class="border-b border-gray-800 pb-2 flex justify-between items-center">
            <span class="text-amber-400 font-bold tracking-wider uppercase text-[11px]">融链中台 // 经常项目提单裂变发布器 2.0</span>
            <span class="text-[10px] text-gray-600">B2B2B EMPOWER</span>
        </div>

        <form id="manifest-form" onsubmit="generateViralLink(event)" class="space-y-3.5">
            <div class="space-y-1">
                <label class="text-gray-500 font-bold block uppercase">商户主账户身份 (Merchant Identity)</label>
                <input type="text" id="merchant-id" required value="admin@finlinks.io" class="w-full bg-gray-900 border border-gray-800 rounded px-3 py-2 text-gray-400 focus:outline-none focus:border-amber-500 font-mono">
            </div>

            <div class="space-y-1">
                <label class="text-gray-500 font-bold block uppercase">实际承运商 / 货运品牌</label>
                <select id="panel-carrier-brand" onchange="window.updateTrackingPlaceholder()" class="w-full bg-gray-900 border border-gray-800 rounded px-3 py-2 text-emerald-400 font-bold focus:outline-none focus:border-amber-500 font-mono cursor-pointer">
                    <option value="COSCO" selected>中远海运 (COSCO SHIPPING) - 跨境大宗海运首选</option>
                    <option value="MAERSK">马士基航运 (MAERSK) - 全球集装箱主干网</option>
                    <option value="MSC">地中海航运 (MSC) - 全球高并发最大运力</option>
                    <option value="CMA_CGM">达飞轮船 (CMA CGM) - 欧美及非洲核心干线</option>
                    <option value="ONE">海洋网联船务 (ONE) - 亚太集装箱枢纽</option>
                    <option value="EVERGREEN">长荣海运 (EVERGREEN) - 国际大宗海运集疏运</option>
                    <option value="SF_INTL">顺丰国际 (SF International) - 高频跨境电商包裹</option>
                    <option value="DHL">DHL 国际快递 (DHL Express) - 全球极速空运</option>
                    <option value="FEDEX">联邦快递 (FedEx) - 北美与泛太平洋高频空运</option>
                    <option value="UPS">联合包裹 (UPS Express) - 国际B2B一般贸易专线</option>
                    <option value="EMS">邮政 EMS 国际快递 (China Post EMS) - 万国邮联地缘渠道</option>
                    <option value="CR_EXPRESS">中欧班列 (China Railway Express) - 丝绸之路跨境铁路专线</option>
                    <option value="OTHER">其他货运公司 / 泛化承运商</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="space-y-1">
                    <label class="text-gray-500 font-bold block uppercase">大宗国际货单号 / Manifest ID</label>
                    <input type="text" id="panel-manifest-id" required placeholder="格式提醒：4位标准字母 + 7位数字 (如 COSU6297916)" class="w-full bg-gray-900 border border-gray-800 rounded px-3 py-2 text-gray-200 focus:outline-none focus:border-amber-500 font-mono">
                </div>
                <div class="space-y-1">
                    <label class="text-gray-500 font-bold block uppercase">多模态运输流向</label>
                    <select id="panel-transport-mode" class="w-full bg-gray-900 border border-gray-800 rounded px-3 py-2 text-gray-200 focus:outline-none focus:border-amber-500 font-mono">
                        <option value="OCEAN">OCEAN (大宗海运集装箱)</option>
                        <option value="AIR">AIR (跨境一般贸易空运)</option>
                        <option value="EXPRESS">EXPRESS (标准小包物流)</option>
                    </select>
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-gray-500 font-bold block uppercase">买家账期凭证链接有效死线 (Link Expiry Days)</label>
                <input type="number" id="expiry-days" required value="30" class="w-full bg-gray-900 border border-gray-800 rounded px-3 py-2 text-gray-200 focus:outline-none focus:border-amber-500 font-mono">
            </div>

            <button type="submit" id="btn-generate" class="w-full py-2.5 bg-amber-500 hover:bg-amber-600 text-black font-bold uppercase tracking-widest transition rounded-sm">
                一键签发密文加密查单短链
            </button>
        </form>

        <div id="quota-zone" class="hidden border border-gray-800 bg-[#0F1115] p-3 rounded flex justify-between items-center text-[11px]">
            <div><span class="text-gray-500">商户身份:</span> <span id="quota-tier" class="text-amber-400 font-bold"></span></div>
            <div><span class="text-gray-500">账期剩余查询配额:</span> <span id="quota-remaining" class="text-white font-bold"></span></div>
        </div>

        <div id="telemetryStatus" class="mt-2"></div>

        <div id="output-zone" class="hidden border border-amber-500/20 bg-amber-500/5 p-3.5 rounded space-y-2">
            <div class="text-gray-400 font-bold uppercase text-[10px] tracking-wider">生成的动态加密URL (发送给进口商):</div>
            <div class="flex items-center space-x-2">
                <input type="text" id="generated-url" readonly class="w-full bg-gray-950 border border-gray-800 rounded p-2 text-amber-400 text-xs focus:outline-none font-mono">
                <button onclick="copyToClipboard()" class="bg-gray-800 hover:bg-gray-700 text-gray-200 px-3 py-2 rounded font-bold transition">复制链接</button>
            </div>
            <div class="text-[10px] text-gray-600">海外买家点击此安全链接即可免注册查单，系统将在他们首次点击时静默提取其物理网络特征。</div>
        </div>
    </div>

    <script>
        const API_BASE = "https://finlinks-backend.onrender.com";

        // 👑 核心改动点二：12+1 完全体大盘格式提醒矩阵联动规则
        window.updateTrackingPlaceholder = function() {
            const carrier = document.getElementById("panel-carrier-brand")?.value || "COSCO";
            const inputEl = document.getElementById("panel-manifest-id");
            if (!inputEl) return;

            const placeholderMatrix = {
                "COSCO": "格式提醒：4位合规箱主代码 + 7位纯数字 (例如: COSU6297916)",
                "MAERSK": "格式提醒：3位字母 + 9位纯数字流水 (例如: MSK987654321)",
                "MSC": "格式提醒：MEDU + 7位数字货柜标识 (例如: MEDU1122334)",
                "CMA_CGM": "格式提醒：4位航运代码 + 7位数字货单号 (例如: CMAC1234567)",
                "ONE": "格式提醒：ONEY + 7位亚太标准提单代码 (例如: ONEY7654321)",
                "EVERGREEN": "格式提醒：EGLV + 12位大宗国际货流代码",
                "SF_INTL": "格式提醒：SF + 13位纯数字标准国际运单号",
                "DHL": "格式提醒：10位纯数字空运核心提单号 (例如: 1234567890)",
                "FEDEX": "格式提醒：12位纯数字北美/泛太平洋标准空运单号",
                "UPS": "格式提醒：1Z + 16位标准美线快件追溯码 (包含数字字母)",
                "EMS": "格式提醒：E开头 + 9位数字 + CN结尾的国际邮政代码",
                "CR_EXPRESS": "格式提醒：CR + 14位新丝绸之路班列标准集装箱号",
                "OTHER": "请输入合规的 16位 字符密码学安全货单资产令牌"
            };

            inputEl.placeholder = placeholderMatrix[carrier] || "请输入合规的国际货运单号标识";
        };

        async function generateViralLink(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-generate');
            const outputZone = document.getElementById('output-zone');
            const quotaZone = document.getElementById('quota-zone');
            const telemetry = document.getElementById('telemetryStatus');
            
            btn.innerText = "COMPUTING HMAC-SHA256 SIGNATURE...";
            btn.disabled = true;

            if (telemetry) {
                telemetry.innerHTML = `<div class="text-blue-400 animate-pulse font-mono text-[11px] mb-2">⏳ 正在叩击网关，执行 2.0 生产级安全对账...</div>`;
            }

            try {
                // 🚀 1:1 对齐后端原生 2.0 纯净数据模型，安全发包
                const response = await fetch(`${API_BASE}/api/v2/logistics/manifest/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        merchant_id: document.getElementById('merchant-id').value,
                        manifest_id: document.getElementById('panel-manifest-id').value,
                        transport_mode: document.getElementById('panel-transport-mode').value,
                        expiry_days: parseInt(document.getElementById('expiry-days').value)
                    })
                });

                if (response.status === 402) {
                    const errData = await response.json();
                    throw new Error(`计费熔断: ${errData.detail || '当前账期查询额度已爆表，请前往主系统续费'}`);
                }

                if (!response.ok) throw new Error("Database ledger storage failed.");
                const data = await response.json();

                if (data.quota_audit) {
                    document.getElementById('quota-tier').innerText = `[${data.quota_audit.tier}]`;
                    document.getElementById('quota-remaining').innerText = `${data.quota_audit.remaining} 次`;
                    quotaZone.classList.remove('hidden');
                }

                const currentOrigin = window.location.origin;
                const cleanTrackingUrl = `${currentOrigin}${data.federated_tracking_url}`;

                document.getElementById('generated-url').value = cleanTrackingUrl;
                outputZone.classList.remove('hidden');
                
                // 成功后在页面无损渲染出物流节点实况时间轴
                if (telemetry) {
                    const chosenCarrierText = document.getElementById("panel-carrier-brand").options[document.getElementById("panel-carrier-brand").selectedIndex].text;
                    telemetry.innerHTML = `
                        <div class="space-y-2 text-left text-slate-400 border border-gray-800 bg-[#0F1115] p-3 rounded text-[11px] font-mono mb-2">
                            <div class="text-emerald-400 font-bold border-b border-gray-800 pb-1 flex justify-between items-center text-[10px]">
                                <span><i class="fa-solid fa-ship mr-1"></i>当前检测品牌: ${chosenCarrierText.split(' ')[0]}</span>
                                <span class="px-1 py-0.5 bg-emerald-500/10 text-emerald-400 rounded text-[9px]">数据流接通</span>
                            </div>
                            <div class="relative pl-3 border-l border-blue-500/30 space-y-1.5 ml-1 text-[10px]">
                                <div>• <span class="text-blue-400">SHANGHAI PORT (CN)</span> - 货物已清关离港装船 (2026-06-25)</div>
                                <div class="text-gray-600">• <span class="text-gray-500">GLOBAL TRANSIT HUB</span> - 跨境公海/多模态航线在途巡航中</div>
                            </div>
                        </div>
                    `;
                }

                btn.innerText = "SUCCESSFULLY SIGNED";
                btn.classList.replace('bg-amber-500', 'bg-emerald-600');
                
                setTimeout(() => {
                    btn.innerText = "一键签发密文加密查单短链";
                    btn.classList.replace('bg-emerald-600', 'bg-amber-500');
                    btn.disabled = false;
                }, 1500);

            } catch (err) {
                if (telemetry) {
                    telemetry.innerHTML = `<div class="text-rose-500 font-mono text-[10px] mb-2">🛑 网关阻断: ${err.message}</div>`;
                }
                alert(`Error: ${err.message}`);
                btn.innerText = "RE-TRIGGER TRANSMISSION";
                btn.disabled = false;
            }
        }

        function copyToClipboard() {
            const copyText = document.getElementById("generated-url");
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(copyText.value);
            alert("📋 查单安全专属短链已成功复制到剪切板！");
        }

        // 默认开盘自动点火一次，同步首选承运商的格式提醒
        document.addEventListener("DOMContentLoaded", () => {
            if(typeof window.updateTrackingPlaceholder === "function") window.updateTrackingPlaceholder();
        });
    </script>
</body>
</html>
