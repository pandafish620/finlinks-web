<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinLinks 5.2.0 - 安全认证控制塔</title>
    <script src="../assets/js/new_auth_sentinel.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; }
        /* 👑 注入高级外汇工作站独占的极光漫反射特效 */
        .ambient-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.04) 0%, rgba(0, 0, 0, 0) 70%);
            top: -250px;
            left: -250px;
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body class="font-sans antialiased flex items-center justify-center h-screen bg-slate-950 relative overflow-hidden select-none">

    <div class="ambient-glow animate-pulse"></div>
    <div class="absolute right-[-200px] bottom-[-200px] w-[600px] h-[600px] bg-[radial-gradient(circle,rgba(20,184,166,0.03)_0%,rgba(0,0,0,0)_60%)] pointer-events-none z-0"></div>

    <div class="w-full max-w-md p-8 bg-slate-900/80 backdrop-blur-xl border border-slate-800/80 rounded-2xl shadow-[0_25px_50px_-12px_rgba(0,0,0,0.7)] space-y-6 z-10 relative transition-all duration-500 hover:border-slate-700/50">
        
        <div class="space-y-2 relative">
            <div class="flex items-center space-x-1.5 mb-1 justify-center">
                <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                <span class="text-[10px] uppercase font-mono tracking-[0.2em] text-slate-500 font-bold">SOVEREIGN NETWORK ADAPTER</span>
            </div>
            <h1 class="text-3xl font-black tracking-tighter text-center bg-gradient-to-r from-emerald-400 via-teal-400 to-emerald-500 bg-clip-text text-transparent font-mono">
                FinLinks <span class="text-xs font-normal text-slate-500 font-sans tracking-normal">v5.2.0</span>
            </h1>
            <p class="text-slate-400 text-center text-xs font-medium tracking-wide">全球多通道聚合商户控制台安全门禁</p>
        </div>

        <form id="loginForm" onsubmit="handleLiveLogin(event)" class="space-y-4 pt-2">
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">商户主权认证邮箱 (Email)</label>
                <input type="email" id="loginEmail" value="zhangxiaoyu620@hotmail.com" class="w-full bg-slate-950/80 border border-slate-800 rounded-xl p-3.5 text-xs text-emerald-400 placeholder-slate-600 focus:outline-none focus:border-emerald-500/50 focus:shadow-[0_0_15px_rgba(16,185,129,0.05)] font-mono transition-all duration-300" required placeholder="请输入您的法人电子邮箱">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">安全访问密匙 (Password)</label>
                <input type="password" id="loginPassword" class="w-full bg-slate-950/80 border border-slate-800 rounded-xl p-3.5 text-xs text-slate-200 placeholder-slate-600 focus:outline-none focus:border-emerald-500/50 focus:shadow-[0_0_15px_rgba(16,185,129,0.05)] font-mono transition-all duration-300" required placeholder="请输入您的安全密码">
            </div>

            <div id="login-msg-box" class="hidden text-[11px] font-mono p-3 bg-slate-950/90 rounded-xl border border-slate-800 transition-all duration-300 leading-relaxed shadow-inner"></div>

            <button type="submit" id="loginBtn" class="w-full bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 text-slate-950 font-extrabold py-3.5 rounded-xl text-xs tracking-widest transition-all duration-300 uppercase shadow-lg shadow-emerald-500/10 active:scale-[0.98] cursor-pointer mt-2">
                🔒 击发实弹确权登录 (AUTHENTICATE)
            </button>
        </form>

        <div class="mt-4 pt-4 border-t border-slate-800/60 flex flex-col space-y-3 text-center">
            <p class="text-xs text-slate-500 tracking-wide">新跨境商户？<a href="register.html" class="text-emerald-400 hover:text-emerald-300 font-bold underline underline-offset-4 ml-1 transition-all">自主入驻申请开户 →</a></p>
            <div id="forgot-password-trigger" class="hidden animate-fade-in">
                <a href="javascript:void(0);" onclick="triggerAccountRecovery()" class="text-[10px] font-mono text-slate-500 hover:text-teal-400 transition-colors uppercase tracking-wider">⚠️ [CREDENTIAL RECOVERY] 忘记密码或用户名找回?</a>
            </div>
        </div>
    </div>

    <script type="module">
        window.triggerAccountRecovery = function() {
            const msgBox = document.getElementById('login-msg-box');
            msgBox.className = "text-[11px] font-mono p-3 bg-slate-950 rounded-xl border border-amber-500/30 text-amber-400 leading-relaxed";
            msgBox.innerText = "ℹ️ [SYSTEM INFRA] 自主身份重置网关并线中。请将您的注册企业法人主体证明发送至 compliance@finlinks.io 申请人工核销放行。";
            msgBox.classList.remove('hidden');
        };

        window.handleLiveLogin = async function(event) {
            event.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const msgBox = document.getElementById('login-msg-box');
            const btn = document.getElementById('loginBtn');
            const recoveryTrigger = document.getElementById('forgot-password-trigger');

            recoveryTrigger.classList.add('hidden');
            msgBox.classList.remove('hidden', 'text-rose-400', 'text-emerald-400', 'border-rose-500/30', 'border-emerald-500/30');
            msgBox.classList.add('text-amber-400', 'border-amber-500/20');
            msgBox.innerText = "⚡ [AUTHENTICATING] 正在通过 NewAuthSentinel 自愈网关核销凭证...";
            btn.disabled = true;
            btn.classList.add("opacity-40", "cursor-not-allowed");

            // 👑 🏁 呼叫主权安全哨兵
            if (window.authSentinel && typeof window.authSentinel.loginMerchant === "function") {
                window.authSentinel.loginMerchant(
                    email, 
                    password,
                    // ✅ 成功回调
                    (result) => {
                        const currentStatus = (result.account_status || "APPROVED").toUpperCase().trim();
                        
                        if (currentStatus === "APPROVED") {
                            msgBox.className = "text-[11px] font-mono p-3 bg-slate-950 rounded-xl border border-emerald-500/30 text-emerald-400 leading-relaxed shadow-lg";
                            msgBox.innerText = "🟢 [SUCCESS] 凭证核销大胜！已获得完全控制权。正在毫秒级弹射控制大厅...";
                            
                            setTimeout(() => {
                                const userLang = navigator.language || navigator.userLanguage;
                                // 🎯 铁血级路径死锁对账：处于同级 /console_v2/ 物理轨道下，直接原位切换！
                                window.location.href = userLang.includes('zh') ? 'dashboard_zh.html' : 'dashboard_en.html';
                            }, 200);
                        } else {
                            msgBox.className = "text-[11px] font-mono p-3 bg-slate-950 rounded-xl border border-amber-500/30 text-amber-400 leading-relaxed shadow-lg";
                            msgBox.innerText = `⚠️ [LIMITED TERMINAL] 身份为 ${currentStatus}。核心清算已阻断，正在物理引流合规准入舱...`;
                            
                            setTimeout(() => {
                                window.location.href = 'kyb_portal.html';
                            }, 1000);
                        }
                    },
                    // ❌ 失败回调
                    (errDetail) => {
                        msgBox.className = "text-[11px] font-mono p-3 bg-slate-950 rounded-xl border border-rose-500/30 text-rose-400 leading-relaxed";
                        msgBox.innerText = `❌ [ERROR] 中台物理拒绝放行: ${errDetail}`;
                        btn.disabled = false;
                        btn.classList.remove("opacity-40", "cursor-not-allowed");
                        recoveryTrigger.classList.remove('hidden');
                    }
                );
            } else {
                msgBox.className = "text-[11px] font-mono p-3 bg-slate-950 rounded-xl border border-rose-500/30 text-rose-400 leading-relaxed";
                msgBox.innerText = "❌ [CRITICAL CODE BLOCK] 鉴权安全哨兵总线 (../assets/js/new_auth_sentinel.js) 挂载断路，请检查物理树路径。";
                btn.disabled = false;
                btn.classList.remove("opacity-40", "cursor-not-allowed");
            }
        }
    </script>
</body>
</html>
